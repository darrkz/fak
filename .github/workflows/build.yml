name: Build Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: DeterminateSystems/nix-installer-action@v16
      
      - name: Compile Keyboard
        # 使用 nix develop 环境运行 python 编译脚本
        run: |
          nix develop --command python3 fak.py compile
          
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ch552-firmware
          # 编译产物通常在 build 文件夹
          path: |
            build/*.bin
            build/*.hex
